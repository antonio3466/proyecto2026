<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Registro de Alumnos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Registro de Alumnos</h1>

  
  <button onclick="logout()">Cerrar Sesión</button>

  <br><br>

  
  <input type="text" id="buscar" placeholder="Buscar alumno...">

  <button onclick="buscarAlumno()">Buscar</button>

  <br><br>

  
  <div id="panelAsistencia">

    <input type="text" id="asistencia" placeholder="Asistencia">

    <input type="text" id="inasistencia" placeholder="Inasistencia">

    <button id="btnAsistencia" onclick="sumarFalta()">
      Registrar Asistencias
    </button>

  </div>

  <br><br>

  
  <div id="panelNota">

    <input type="text" id="nota" placeholder="Nota">

    <button id="btnNota" onclick="agregarNota()">
      Agregar Nota
    </button>

  </div>

  <h2>Lista de Alumnos</h2>

  <table id="tabla" border="1">

    <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Materia</th>
      <th>Registro de Asistencias</th>
      <th>Nota</th>
    </tr>

  </table>

  <script src="script.js"></script>


</body>
</html>

  <script src="datos.js"></script>
  <script src="script.js"></script>
