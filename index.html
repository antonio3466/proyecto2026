<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Alumnos</title>

  
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Registro de Alumnos</h1>

 
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="apellido" placeholder="Apellido">

  <button onclick="agregarAlumno()">Buscar Alumno</button>

  <br><br>

  <input type="text" id="asistencia" placeholder="Asistencia">
  <input type="text" id="inasistencia" placeholder="Inasistencia">

  <button onclick="sumarFalta()">Registrar Asistencias</button>

  <h2>Lista de Alumnos</h2>

  <table id="tabla" border="1">
    <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Inasistencias</th>
      <th>Estado</th>
    </tr>
  </table>

  
  <script src=""></script>

</body>
</html>
