<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Alumnos</title>

  
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Registro de Alumnos</h1>

 
<input type="text" id="buscar" placeholder="Buscar alumno...">
<button onclick="buscarAlumno()">Buscar</button>

  <br><br>

  <input type="text" id="asistencia" placeholder="Asistencia">
  <input type="text" id="inasistencia" placeholder="Inasistencia">

  <button onclick="sumarFalta()">Registrar Asistencias</button>

   <br><br>
  <input type="text" id="nota" placeholder="Nota">
  <button onclick="agregarNota()">Agregar Nota</button>

  <h2>Lista de Alumnos</h2>

  <table id="tabla" border="1">
    <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Materia</th>
      <th>Registro de Asistencias</th>
      <th>Nota</th>
    </tr>
  </table>

  
  <script src="script.js"></script>

</body>
</html>
